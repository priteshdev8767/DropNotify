<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 185" width="640" height="185">
  <defs>
    <linearGradient id="og" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>

  <!-- Icon: zigzag price drop arrow ending with bell + notification dot -->
  <g transform="translate(222, 10)">
    <polyline
      points="0,44  20,44  36,18  52,34  68,6  76,6"
      fill="none" stroke="url(#og)" stroke-width="8.5"
      stroke-linecap="round" stroke-linejoin="round"
    />
    <line x1="76" y1="6" x2="100" y2="56"
      stroke="url(#og)" stroke-width="8.5" stroke-linecap="round"
    />
    <g transform="translate(88.5, 59)">
      <path d="M11.5 0 C5 0 1 5.5 1 11.5 L1 19 L22 19 L22 11.5 C22 5.5 18 0 11.5 0Z" fill="url(#og)"/>
      <path d="M7.5 19 Q7.5 24.5 11.5 24.5 Q15.5 24.5 15.5 19Z" fill="url(#og)"/>
      <rect x="9.5" y="-3" width="4" height="5" rx="2" fill="url(#og)"/>
      <circle cx="20" cy="4.5" r="5.5" fill="white"/>
      <circle cx="20" cy="4.5" r="3.8" fill="#f97316"/>
    </g>
  </g>

  <!-- "drop" in dark charcoal -->
  <text x="20" y="155"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="90" font-weight="900" letter-spacing="-3" fill="#2d3142"
  >drop</text>

  <!-- "notify" in orange -->
  <text x="280" y="155"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="90" font-weight="900" letter-spacing="-3" fill="url(#og)"
  >notify</text>
</svg>
